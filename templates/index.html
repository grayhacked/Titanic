<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titanic Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page">
    <section class="panel intro">
      <p class="kicker">Machine Learning Demo</p>
      <h1>Prediction de survie Titanic</h1>
      <p>
        Cette interface envoie les donnees a ton API FastAPI et affiche la prediction du modele.
      </p>
      <a class="doc-link" href="/docs" target="_blank" rel="noopener noreferrer">Voir la documentation API</a>
    </section>

    <section class="panel form-panel">
      <form id="predict-form" autocomplete="off">
        <div class="grid">
          <label>
            Classe (Pclass)
            <select name="Pclass" required>
              <option value="1">1ere classe</option>
              <option value="2">2eme classe</option>
              <option value="3" selected>3eme classe</option>
            </select>
          </label>

          <label>
            Sexe
            <select name="Sex" required>
              <option value="male" selected>Male</option>
              <option value="female">Female</option>
            </select>
          </label>

          <label>
            Age
            <input type="number" name="Age" min="0" max="120" value="30" required />
          </label>

          <label>
            Freres/soeurs + conjoint (SibSp)
            <input type="number" name="SibSp" min="0" value="0" required />
          </label>

          <label>
            Parents/enfants (Parch)
            <input type="number" name="Parch" min="0" value="0" required />
          </label>

          <label>
            Tarif (Fare)
            <input type="number" step="0.01" name="Fare" min="0" value="32.2" required />
          </label>

          <label>
            Port d'embarquement
            <select name="Embarked" required>
              <option value="S" selected>Southampton (S)</option>
              <option value="C">Cherbourg (C)</option>
              <option value="Q">Queenstown (Q)</option>
            </select>
          </label>
        </div>

        <button type="submit">Predire</button>
      </form>

      <article id="result" class="result hidden" aria-live="polite"></article>
    </section>
  </main>

  <script>
    const form = document.getElementById("predict-form");
    const resultBox = document.getElementById("result");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(form);
      const payload = {
        Pclass: Number(formData.get("Pclass")),
        Sex: String(formData.get("Sex")),
        Age: Number(formData.get("Age")),
        SibSp: Number(formData.get("SibSp")),
        Parch: Number(formData.get("Parch")),
        Fare: Number(formData.get("Fare")),
        Embarked: String(formData.get("Embarked"))
      };

      resultBox.classList.remove("hidden");
      resultBox.className = "result";
      resultBox.textContent = "Prediction en cours...";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Erreur API");
        }

        const prob = typeof data.survival_probability === "number"
          ? `Probabilite de survie: ${(data.survival_probability * 100).toFixed(1)}%`
          : "Probabilite indisponible pour ce modele";

        resultBox.classList.add(data.survived ? "ok" : "ko");
        resultBox.innerHTML = `
          <h2>${data.prediction_label}</h2>
          <p>${prob}</p>
        `;
      } catch (error) {
        resultBox.classList.add("ko");
        resultBox.textContent = `Erreur: ${error.message}`;
      }
    });
  </script>
</body>
</html>
